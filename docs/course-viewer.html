<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Course Lesson Viewer</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <header class="site-header">
      <h1>Lesson Viewer</h1>
      <nav class="nav" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="start-here.html">Start Here</a>
        <a href="courses.html">Courses</a>
        <a href="help.html">Help</a>
      </nav>
    </header>

    <main id="main" class="container">
      <div id="breadcrumb" class="breadcrumb"></div>
      <section class="hero">
        <h2 id="lesson-title">Loading lesson…</h2>
        <p class="note">
          This lesson is displayed from the course repository, but you stay on the learning site.
        </p>
      </section>

      <section id="lesson-content" class="section card lesson-content" aria-live="polite"></section>

      <section class="section">
        <div class="button-row" id="lesson-nav"></div>
      </section>

      <section class="section">
        <div class="button-row">
          <button class="btn btn-primary" id="mark-complete" type="button">
            Mark lesson complete
          </button>
          <a class="btn btn-secondary" href="courses.html">Back to courses</a>
          <a
            class="btn btn-secondary"
            href="https://github.com/MrLucien-Johnson/programming-foundations-course"
          >
            View repository
          </a>
        </div>
        <p id="completion-status" class="note"></p>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const repoPath = params.get("path");
      const contentEl = document.getElementById("lesson-content");
      const titleEl = document.getElementById("lesson-title");
      const breadcrumbEl = document.getElementById("breadcrumb");
      const lessonNavEl = document.getElementById("lesson-nav");
      const markCompleteBtn = document.getElementById("mark-complete");
      const completionStatus = document.getElementById("completion-status");

      const COURSES = [
        {
          id: "python",
          name: "Python Course",
          page: "python-course.html",
          modules: [
            {
              title: "Setup & First Script",
              path: "python-beginner-workbook/module-01-setup/README.md",
              quiz: "python-beginner-workbook/module-01-setup/exercises/quiz.md",
            },
            {
              title: "Python Basics",
              path: "python-beginner-workbook/module-02-basics/README.md",
              quiz: "python-beginner-workbook/module-02-basics/exercises/quiz.md",
            },
            {
              title: "Control Flow",
              path: "python-beginner-workbook/module-03-control-flow/README.md",
              quiz: "python-beginner-workbook/module-03-control-flow/exercises/quiz.md",
            },
            {
              title: "Functions",
              path: "python-beginner-workbook/module-04-functions/README.md",
              quiz: "python-beginner-workbook/module-04-functions/exercises/quiz.md",
            },
            {
              title: "Collections",
              path: "python-beginner-workbook/module-05-collections/README.md",
              quiz: "python-beginner-workbook/module-05-collections/exercises/quiz.md",
            },
            {
              title: "Object-Oriented Programming",
              path: "python-beginner-workbook/module-06-oop/README.md",
              quiz: "python-beginner-workbook/module-06-oop/exercises/quiz.md",
            },
            {
              title: "Task Tracker Project",
              path: "python-beginner-workbook/module-07-task-tracker/README.md",
              quiz: "python-beginner-workbook/module-07-task-tracker/exercises/quiz.md",
            },
          ],
        },
        {
          id: "csharp",
          name: "C# Course",
          page: "csharp-course.html",
          modules: [
            {
              title: "Setup & First Program",
              path: "csharp-beginner-workbook/module-01-setup/README.md",
              quiz: "csharp-beginner-workbook/module-01-setup/exercises/quiz.md",
            },
            {
              title: "C# Basics",
              path: "csharp-beginner-workbook/module-02-basics/README.md",
              quiz: "csharp-beginner-workbook/module-02-basics/exercises/quiz.md",
            },
            {
              title: "Control Flow",
              path: "csharp-beginner-workbook/module-03-control-flow/README.md",
              quiz: "csharp-beginner-workbook/module-03-control-flow/exercises/quiz.md",
            },
            {
              title: "Methods",
              path: "csharp-beginner-workbook/module-04-methods/README.md",
              quiz: "csharp-beginner-workbook/module-04-methods/exercises/quiz.md",
            },
            {
              title: "Collections",
              path: "csharp-beginner-workbook/module-05-collections/README.md",
              quiz: "csharp-beginner-workbook/module-05-collections/exercises/quiz.md",
            },
            {
              title: "Object-Oriented Programming",
              path: "csharp-beginner-workbook/module-06-oop-intro/README.md",
              quiz: "csharp-beginner-workbook/module-06-oop-intro/exercises/quiz.md",
            },
            {
              title: "Task Tracker Project",
              path: "csharp-beginner-workbook/module-07-task-tracker/README.md",
              quiz: "csharp-beginner-workbook/module-07-task-tracker/exercises/quiz.md",
            },
          ],
        },
        {
          id: "ai",
          name: "AI Prompt Creation Course",
          page: "ai-course.html",
          modules: [
            {
              title: "AI Foundations",
              path: "languages/ai/beginner/modules/01-ai-foundations.md",
              quiz: "languages/ai/beginner/modules/01-ai-foundations.quiz.md",
            },
            {
              title: "Prompting Basics",
              path: "languages/ai/beginner/modules/02-prompting-basics.md",
              quiz: "languages/ai/beginner/modules/02-prompting-basics.quiz.md",
            },
            {
              title: "Prompt Patterns",
              path: "languages/ai/beginner/modules/03-prompt-patterns.md",
              quiz: "languages/ai/beginner/modules/03-prompt-patterns.quiz.md",
            },
            {
              title: "Evaluation & Iteration",
              path: "languages/ai/beginner/modules/04-evaluation-and-iteration.md",
              quiz: "languages/ai/beginner/modules/04-evaluation-and-iteration.quiz.md",
            },
            {
              title: "Safety & Policy Basics",
              path: "languages/ai/beginner/modules/05-safety-and-policy-basics.md",
              quiz: "languages/ai/beginner/modules/05-safety-and-policy-basics.quiz.md",
            },
            {
              title: "Workflows & Automation",
              path: "languages/ai/beginner/modules/06-workflows-and-automation.md",
              quiz: "languages/ai/beginner/modules/06-workflows-and-automation.quiz.md",
            },
            {
              title: "Advanced Prompting & Tool Use",
              path: "languages/ai/intermediate/modules/01-advanced-prompting-tool-use.md",
              quiz:
                "languages/ai/intermediate/modules/01-advanced-prompting-tool-use.quiz.md",
            },
            {
              title: "Structured Outputs & Schemas",
              path: "languages/ai/intermediate/modules/02-structured-outputs-and-schemas.md",
              quiz:
                "languages/ai/intermediate/modules/02-structured-outputs-and-schemas.quiz.md",
            },
            {
              title: "RAG Foundations",
              path: "languages/ai/intermediate/modules/03-rag-foundations.md",
              quiz: "languages/ai/intermediate/modules/03-rag-foundations.quiz.md",
            },
            {
              title: "Model Evaluation & Testing",
              path: "languages/ai/intermediate/modules/04-model-evaluation-and-testing.md",
              quiz:
                "languages/ai/intermediate/modules/04-model-evaluation-and-testing.quiz.md",
            },
            {
              title: "Guardrails & Safety",
              path: "languages/ai/intermediate/modules/05-guardrails-and-safety.md",
              quiz: "languages/ai/intermediate/modules/05-guardrails-and-safety.quiz.md",
            },
            {
              title: "Agentic Workflows",
              path: "languages/ai/intermediate/modules/06-agentic-workflows.md",
              quiz: "languages/ai/intermediate/modules/06-agentic-workflows.quiz.md",
            },
            {
              title: "Cost, Latency & Ops",
              path: "languages/ai/intermediate/modules/07-cost-latency-and-ops.md",
              quiz: "languages/ai/intermediate/modules/07-cost-latency-and-ops.quiz.md",
            },
            {
              title: "Deployment Basics",
              path: "languages/ai/intermediate/modules/08-deployment-basics.md",
              quiz: "languages/ai/intermediate/modules/08-deployment-basics.quiz.md",
            },
            {
              title: "System Design for LLM Apps",
              path: "languages/ai/advanced/modules/01-system-design-for-llm-apps.md",
              quiz: "languages/ai/advanced/modules/01-system-design-for-llm-apps.quiz.md",
            },
            {
              title: "RAG Advanced Retrieval",
              path: "languages/ai/advanced/modules/02-rag-advanced-retrieval.md",
              quiz:
                "languages/ai/advanced/modules/02-rag-advanced-retrieval.quiz.md",
            },
            {
              title: "Evals at Scale",
              path: "languages/ai/advanced/modules/03-evals-at-scale.md",
              quiz: "languages/ai/advanced/modules/03-evals-at-scale.quiz.md",
            },
            {
              title: "Security Threat Modeling",
              path: "languages/ai/advanced/modules/04-security-threat-modeling-llm.md",
              quiz:
                "languages/ai/advanced/modules/04-security-threat-modeling-llm.quiz.md",
            },
            {
              title: "Observability & Monitoring",
              path: "languages/ai/advanced/modules/05-observability-and-monitoring-llm.md",
              quiz:
                "languages/ai/advanced/modules/05-observability-and-monitoring-llm.quiz.md",
            },
            {
              title: "Reliability & Fallbacks",
              path: "languages/ai/advanced/modules/06-reliability-and-fallbacks.md",
              quiz:
                "languages/ai/advanced/modules/06-reliability-and-fallbacks.quiz.md",
            },
            {
              title: "Data Governance & Privacy",
              path: "languages/ai/advanced/modules/07-data-governance-and-privacy.md",
              quiz:
                "languages/ai/advanced/modules/07-data-governance-and-privacy.quiz.md",
            },
            {
              title: "Production Incident Playbooks",
              path: "languages/ai/advanced/modules/08-production-incident-playbooks.md",
              quiz:
                "languages/ai/advanced/modules/08-production-incident-playbooks.quiz.md",
            },
          ],
        },
      ];

      const completedKey = "course-completions";

      const getCompletions = () => {
        try {
          return JSON.parse(localStorage.getItem(completedKey)) || [];
        } catch (error) {
          return [];
        }
      };

      const saveCompletion = (path) => {
        const completions = new Set(getCompletions());
        completions.add(path);
        localStorage.setItem(completedKey, JSON.stringify([...completions]));
      };

      const isCompleted = (path) => getCompletions().includes(path);

      const findLesson = (path) => {
        for (const course of COURSES) {
          const index = course.modules.findIndex((module) => module.path === path);
          if (index !== -1) {
            return { course, index, module: course.modules[index] };
          }
        }
        return null;
      };

      if (!repoPath) {
        titleEl.textContent = "Lesson not found";
        contentEl.innerHTML = "<p>Please return to the courses page and select a lesson.</p>";
        markCompleteBtn.disabled = true;
      } else {
        const rawRoot =
          "https://raw.githubusercontent.com/MrLucien-Johnson/programming-foundations-course/main/";
        const rawUrl = new URL(repoPath, rawRoot).toString();
        const baseDir = new URL(".", rawUrl);
        const lessonInfo = findLesson(repoPath);

        if (lessonInfo) {
          const { course, module, index } = lessonInfo;
          breadcrumbEl.innerHTML = `
            <a href="courses.html">Courses</a> /
            <a href="${course.page}">${course.name}</a> /
            <span>${module.title}</span>
          `;

          const prevModule = course.modules[index - 1];
          const nextModule = course.modules[index + 1];
          lessonNavEl.innerHTML = "";
          if (prevModule) {
            const prevLink = document.createElement("a");
            prevLink.className = "btn btn-secondary";
            prevLink.href = `course-viewer.html?path=${encodeURIComponent(prevModule.path)}`;
            prevLink.textContent = `Previous: ${prevModule.title}`;
            lessonNavEl.appendChild(prevLink);
          }
          if (nextModule) {
            const nextLink = document.createElement("a");
            nextLink.className = "btn btn-primary";
            nextLink.href = `course-viewer.html?path=${encodeURIComponent(nextModule.path)}`;
            nextLink.textContent = `Next: ${nextModule.title}`;
            lessonNavEl.appendChild(nextLink);
          }

          if (module.quiz) {
            const quizLink = document.createElement("a");
            quizLink.className = "btn btn-secondary";
            quizLink.href = `quiz-viewer.html?quiz=${encodeURIComponent(module.quiz)}`;
            quizLink.textContent = "Take the quiz";
            lessonNavEl.appendChild(quizLink);
          }

          if (isCompleted(repoPath)) {
            completionStatus.textContent = "Marked as complete.";
          }
        }

        fetch(rawUrl)
          .then((response) => {
            if (!response.ok) {
              throw new Error("Lesson not available.");
            }
            return response.text();
          })
          .then((markdown) => {
            const html = marked.parse(markdown);
            contentEl.innerHTML = html;
            const firstHeading = contentEl.querySelector("h1");
            if (firstHeading) {
              titleEl.textContent = firstHeading.textContent;
            }

            contentEl.querySelectorAll("a[href]").forEach((link) => {
              const href = link.getAttribute("href");
              if (!href || href.startsWith("#") || href.startsWith("mailto:")) {
                return;
              }
              if (href.startsWith("http")) {
                link.setAttribute("target", "_blank");
                link.setAttribute("rel", "noopener");
                return;
              }
              const resolved = new URL(href, baseDir);
              const resolvedPath = resolved.toString().replace(rawRoot, "");
              if (href.endsWith(".md")) {
                if (
                  resolvedPath.endsWith("quiz.md") ||
                  resolvedPath.endsWith("quiz-answers.md") ||
                  resolvedPath.endsWith(".quiz.md") ||
                  resolvedPath.endsWith(".quiz-answers.md")
                ) {
                  const quizPath = resolvedPath
                    .replace("quiz-answers.md", "quiz.md")
                    .replace(".quiz-answers.md", ".quiz.md");
                  link.setAttribute(
                    "href",
                    `quiz-viewer.html?quiz=${encodeURIComponent(quizPath)}`
                  );
                  return;
                }
                link.setAttribute(
                  "href",
                  `course-viewer.html?path=${encodeURIComponent(resolvedPath)}`
                );
              } else {
                link.setAttribute("href", resolved.toString());
              }
            });

            contentEl.querySelectorAll("img[src]").forEach((img) => {
              const src = img.getAttribute("src");
              if (!src || src.startsWith("http")) {
                return;
              }
              const resolved = new URL(src, baseDir);
              img.setAttribute("src", resolved.toString());
            });

            if (lessonInfo && lessonInfo.module.quiz) {
              const quizButtonHtml = `
                <div class="note">
                  <strong>Interactive quiz available.</strong>
                  <a href="quiz-viewer.html?quiz=${encodeURIComponent(lessonInfo.module.quiz)}">
                    Take the quiz
                  </a>
                </div>
              `;
              contentEl.querySelectorAll("h2, h3").forEach((heading) => {
                if (/quiz/i.test(heading.textContent)) {
                  const wrapper = document.createElement("div");
                  wrapper.innerHTML = quizButtonHtml;
                  const replacement = wrapper.firstElementChild;
                  const nextHeading = (node) => {
                    let current = node;
                    while (current) {
                      current = current.nextSibling;
                      if (!current) return null;
                      if (current.nodeType === 1 && /H2|H3/.test(current.tagName)) {
                        return current;
                      }
                    }
                    return null;
                  };
                  const stopAt = nextHeading(heading);
                  let cursor = heading;
                  while (cursor && cursor !== stopAt) {
                    const next = cursor.nextSibling;
                    cursor.remove();
                    cursor = next;
                  }
                  if (replacement) {
                    if (stopAt) {
                      stopAt.before(replacement);
                    } else {
                      contentEl.appendChild(replacement);
                    }
                  }
                }
              });
            }
          })
          .catch((error) => {
            titleEl.textContent = "Lesson unavailable";
            contentEl.innerHTML = `<p>${error.message}</p>`;
          });
      }

      markCompleteBtn.addEventListener("click", () => {
        if (!repoPath) return;
        saveCompletion(repoPath);
        completionStatus.textContent = "Marked as complete.";
      });
    </script>
  </body>
</html>
