<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Interactive Quiz</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <header class="site-header">
      <h1>Interactive Quiz</h1>
      <nav class="nav" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="start-here.html">Start Here</a>
        <a href="courses.html">Courses</a>
        <a href="help.html">Help</a>
      </nav>
    </header>

    <main id="main" class="container">
      <section class="hero">
        <h2 id="quiz-title">Loading quiz…</h2>
        <p class="note">Answer each question, then click “Check answers”.</p>
      </section>

      <section id="quiz-intro" class="section card">
        <h3>Quiz overview</h3>
        <p id="quiz-meta">Loading quiz details…</p>
        <div class="button-row">
          <button class="btn btn-primary" id="start-quiz" type="button">Start quiz</button>
        </div>
      </section>

      <section id="quiz-container" class="section card" aria-live="polite"></section>

      <section class="section" id="quiz-actions">
        <div class="button-row">
          <button class="btn btn-primary" id="check-answers" type="button">Check answers</button>
          <button class="btn btn-secondary" id="reset-quiz" type="button">Try again</button>
          <a class="btn btn-secondary" href="courses.html">Back to courses</a>
        </div>
        <p id="quiz-score" class="quiz-score"></p>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const quizPath = params.get("quiz");
      const quizTitle = document.getElementById("quiz-title");
      const quizContainer = document.getElementById("quiz-container");
      const scoreEl = document.getElementById("quiz-score");
      const checkButton = document.getElementById("check-answers");
      const resetButton = document.getElementById("reset-quiz");
      const startButton = document.getElementById("start-quiz");
      const actionsSection = document.getElementById("quiz-actions");
      const introSection = document.getElementById("quiz-intro");
      const metaEl = document.getElementById("quiz-meta");
      const rawRoot =
        "https://raw.githubusercontent.com/MrLucien-Johnson/programming-foundations-course/main/";

      const fetchText = (path) => fetch(new URL(path, rawRoot)).then((response) => {
        if (!response.ok) {
          throw new Error("Quiz not available yet.");
        }
        return response.text();
      });

      const buildAnswerPath = (path) => {
        if (path.endsWith(".quiz.md")) {
          return path.replace(".quiz.md", ".quiz-answers.md");
        }
        return path.replace("quiz.md", "quiz-answers.md");
      };

      const fallbackAnswerPath = (path) => {
        if (path.includes("/exercises/quiz.md")) {
          return path.replace("/exercises/quiz.md", "/solutions/quiz-answers.md");
        }
        return null;
      };

      const parseQuiz = (markdown) => {
        const lines = markdown.split("\n");
        const questions = [];
        let current = null;

        const pushCurrent = () => {
          if (!current) return;
          if (current.options.length === 0 && /true or false/i.test(current.prompt)) {
            current.options = ["True", "False"];
          }
          questions.push(current);
          current = null;
        };

        lines.forEach((line) => {
          const questionMatch = line.match(/^###\s+(.*)$/);
          if (questionMatch) {
            pushCurrent();
            current = {
              prompt: questionMatch[1].trim(),
              options: [],
            };
            return;
          }

          if (!current) return;
          const optionMatch = line.match(/^[A-D]\)\s+(.*)$/);
          if (optionMatch) {
            current.options.push(optionMatch[1].trim());
          }
        });

        pushCurrent();
        return questions;
      };

      const parseAnswers = (markdown) => {
        const lines = markdown.split("\n");
        const answers = new Map();
        let currentQuestion = null;
        let currentAnswer = null;
        let currentExplanation = [];

        const flush = () => {
          if (currentQuestion && currentAnswer) {
            answers.set(currentQuestion, {
              answer: currentAnswer,
              explanation: currentExplanation.join("\n").trim(),
            });
          }
          currentQuestion = null;
          currentAnswer = null;
          currentExplanation = [];
        };

        lines.forEach((line) => {
          const questionMatch = line.match(/^##\s+Question\s+\d+:\s+(.*)$/);
          const trueFalseMatch = line.match(/^###\s+True or False:\s+(.*)$/);
          if (questionMatch || trueFalseMatch) {
            flush();
            currentQuestion = (questionMatch || trueFalseMatch)[1].trim();
            return;
          }

          if (!currentQuestion) return;
          const answerMatch = line.match(/\*\*Answer:\s+([^*]+)\*\*/);
          if (answerMatch) {
            currentAnswer = answerMatch[1].trim();
            return;
          }

          const explanationMatch = line.match(/\*\*Explanation:\s*(.*)$/);
          if (explanationMatch) {
            currentExplanation.push(explanationMatch[1].trim());
            return;
          }

          if (currentAnswer && currentExplanation.length > 0) {
            if (line.startsWith("---") || line.startsWith("## ")) {
              flush();
              return;
            }
            if (line.trim()) {
              currentExplanation.push(line);
            }
          }
        });

        flush();
        return answers;
      };

      const normalizeAnswer = (answerText, options) => {
        if (!answerText) return null;
        const letterMatch = answerText.match(/[A-D]/i);
        if (letterMatch && options.length > 0) {
          return letterMatch[0].toUpperCase();
        }
        if (/false/i.test(answerText)) {
          return "False";
        }
        if (/true/i.test(answerText)) {
          return "True";
        }
        return answerText;
      };

      const renderQuiz = (questions, answers) => {
        quizContainer.innerHTML = "";
        questions.forEach((question, index) => {
          const questionEl = document.createElement("div");
          questionEl.className = "quiz-question";
          const promptEl = document.createElement("h3");
          promptEl.textContent = `${index + 1}. ${question.prompt}`;
          questionEl.appendChild(promptEl);

          const optionsEl = document.createElement("div");
          optionsEl.className = "quiz-options";
          const options = question.options.length > 0 ? question.options : ["True", "False"];

          options.forEach((option, optionIndex) => {
            const label = document.createElement("label");
            label.className = "quiz-option";
            const input = document.createElement("input");
            input.type = "radio";
            input.name = `question-${index}`;
            input.value = option;
            input.setAttribute("aria-label", option);
            label.appendChild(input);
            const text = document.createElement("span");
            text.textContent = `${String.fromCharCode(65 + optionIndex)}) ${option}`;
            label.appendChild(text);
            optionsEl.appendChild(label);
          });

          const answerEntry =
            answers.get(question.prompt) || answers.get(question.prompt.replace(/^[^:]+:\s*/, ""));
          const answerKey = answerEntry ? answerEntry.answer : null;
          questionEl.dataset.answer = normalizeAnswer(answerKey, options);
          questionEl.dataset.explanation = answerEntry ? answerEntry.explanation : "";
          const explanationEl = document.createElement("div");
          explanationEl.className = "quiz-explanation";
          explanationEl.style.display = "none";
          const toggleButton = document.createElement("button");
          toggleButton.type = "button";
          toggleButton.className = "quiz-explain-toggle";
          toggleButton.textContent = "Show explanation";
          toggleButton.disabled = true;
          toggleButton.setAttribute("aria-expanded", "false");
          toggleButton.addEventListener("click", () => {
            const isHidden = explanationEl.style.display === "none";
            explanationEl.style.display = isHidden ? "block" : "none";
            toggleButton.textContent = isHidden ? "Hide explanation" : "Show explanation";
            toggleButton.setAttribute("aria-expanded", isHidden ? "true" : "false");
          });
          questionEl.appendChild(optionsEl);
          questionEl.appendChild(toggleButton);
          questionEl.appendChild(explanationEl);
          quizContainer.appendChild(questionEl);
        });
      };

      const checkAnswers = () => {
        let correct = 0;
        const questions = quizContainer.querySelectorAll(".quiz-question");
        questions.forEach((questionEl) => {
          const correctAnswer = questionEl.dataset.answer;
          const explanationEl = questionEl.querySelector(".quiz-explanation");
          const toggleButton = questionEl.querySelector(".quiz-explain-toggle");
          const optionLabels = questionEl.querySelectorAll(".quiz-option");
          let selectedValue = null;
          optionLabels.forEach((label) => {
            const input = label.querySelector("input");
            label.classList.remove("correct", "incorrect");
            if (input.checked) {
              selectedValue = input.value;
            }
          });

          optionLabels.forEach((label) => {
            const input = label.querySelector("input");
            const isCorrect = correctAnswer
              ? input.value.toLowerCase() === correctAnswer.toLowerCase() ||
                (correctAnswer.length === 1 &&
                  input.value === input.value &&
                  label.textContent.trim().startsWith(correctAnswer))
              : false;

            if (isCorrect) {
              label.classList.add("correct");
            }
          });

          if (selectedValue && correctAnswer) {
            const selectedLabel = Array.from(optionLabels).find(
              (label) => label.querySelector("input").value === selectedValue
            );
            if (
              selectedValue.toLowerCase() === correctAnswer.toLowerCase() ||
              (correctAnswer.length === 1 &&
                selectedLabel.textContent.trim().startsWith(correctAnswer))
            ) {
              correct += 1;
            } else if (selectedLabel) {
              selectedLabel.classList.add("incorrect");
            }
          }

          if (explanationEl) {
            const explanationText = questionEl.dataset.explanation || "";
            if (explanationText && window.marked) {
              explanationEl.innerHTML = marked.parse(explanationText);
            } else if (explanationText) {
              explanationEl.textContent = explanationText;
            } else if (correctAnswer) {
              explanationEl.textContent = `Correct answer: ${correctAnswer}`;
            } else {
              explanationEl.textContent = "";
            }
            const hasExplanation =
              explanationEl.textContent.trim() || explanationEl.innerHTML.trim();
            explanationEl.style.display = hasExplanation ? "block" : "none";
            if (toggleButton) {
              toggleButton.disabled = !hasExplanation;
              toggleButton.textContent = hasExplanation ? "Hide explanation" : "Show explanation";
              toggleButton.setAttribute("aria-expanded", hasExplanation ? "true" : "false");
            }
          }
        });

        scoreEl.textContent = `Score: ${correct}/${questions.length}`;
      };

      const resetQuiz = () => {
        quizContainer.querySelectorAll("input[type='radio']").forEach((input) => {
          input.checked = false;
        });
        quizContainer.querySelectorAll(".quiz-option").forEach((label) => {
          label.classList.remove("correct", "incorrect");
        });
        quizContainer.querySelectorAll(".quiz-explanation").forEach((explanation) => {
          explanation.style.display = "none";
        });
        quizContainer.querySelectorAll(".quiz-explain-toggle").forEach((button) => {
          button.textContent = "Show explanation";
          button.disabled = true;
          button.setAttribute("aria-expanded", "false");
        });
        scoreEl.textContent = "";
      };

      quizContainer.style.display = "none";
      checkButton.disabled = true;
      if (actionsSection) {
        actionsSection.style.display = "none";
      }

      const showQuiz = () => {
        quizContainer.style.display = "block";
        if (introSection) {
          introSection.style.display = "none";
        }
        checkButton.disabled = false;
        if (actionsSection) {
          actionsSection.style.display = "block";
        }
        resetQuiz();
      };

      if (startButton) {
        startButton.addEventListener("click", showQuiz);
      }

      if (resetButton) {
        resetButton.addEventListener("click", resetQuiz);
      }

      if (!quizPath) {
        quizTitle.textContent = "Quiz not found";
        quizContainer.innerHTML = "<p>Please return to the courses page and select a quiz.</p>";
        checkButton.disabled = true;
        if (introSection) {
          introSection.style.display = "none";
        }
      } else {
        const answersPath = buildAnswerPath(quizPath);
        fetchText(quizPath)
          .then((quizMarkdown) => {
            const questions = parseQuiz(quizMarkdown);
            quizTitle.textContent = quizMarkdown.split("\n")[0].replace(/^#\s+/, "") || "Quiz";
            if (metaEl) {
              const minutes = Math.max(2, Math.round(questions.length * 1.2));
              metaEl.textContent = `Questions: ${questions.length} · Passing score: 70% · Estimated time: ${minutes} minutes`;
            }

            return fetchText(answersPath)
              .then((answersMarkdown) => {
                const answers = parseAnswers(answersMarkdown);
                renderQuiz(questions, answers);
              })
              .catch(() => {
                const fallback = fallbackAnswerPath(quizPath);
                if (!fallback) {
                  renderQuiz(questions, new Map());
                  return;
                }
                return fetchText(fallback)
                  .then((answersMarkdown) => {
                    const answers = parseAnswers(answersMarkdown);
                    renderQuiz(questions, answers);
                  })
                  .catch(() => {
                    renderQuiz(questions, new Map());
                  });
              });
          })
          .catch((error) => {
            quizTitle.textContent = "Quiz unavailable";
            quizContainer.innerHTML = `<p>${error.message}</p>`;
            checkButton.disabled = true;
            if (introSection) {
              introSection.style.display = "none";
            }
          });
      }

      checkButton.addEventListener("click", checkAnswers);
    </script>
  </body>
</html>
